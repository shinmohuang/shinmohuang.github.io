<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json", function (data) {
            var totalCitation = data['citedby']
            var totalCitEle = document.getElementById('total_cit');
            if (totalCitEle) {
                totalCitEle.innerHTML = totalCitation;
            }
            var citationEles = document.getElementsByClassName('show_paper_citations')
            Array.prototype.forEach.call(citationEles, element => {
                var paperId = element.getAttribute('data')
                var publication = data['publications'][paperId]
                if (!publication) {
                    element.innerHTML = "<img src='https://img.shields.io/badge/citations-N%2FA-lightgrey?logo=Google%20Scholar&labelColor=f6f6f6&style=flat' alt='Google Scholar citations'>"
                    return
                }
                var numCitations = publication['num_citations']
                element.innerHTML = "<img src='https://img.shields.io/badge/citations-" + encodeURIComponent(numCitations) + "-9cf?logo=Google%20Scholar&labelColor=f6f6f6&style=flat' alt='Google Scholar citations'>"
            });
        });
    })
</script>
